<footer class="player-bar" [class.visible]="musicService.currentTrack() !== null">

  <!-- Progress bar spans full width at top -->
  <div class="progress-track">
    <div class="progress-fill" [style.width.%]="progress"></div>
    <input
      type="range" class="progress-input"
      [value]="progress" min="0" max="100" step="0.5"
      (input)="onSeek($event)"
    />
  </div>

  <div class="player-inner">
    <!-- Left: current track -->
    <div class="current-track">
      @if (musicService.currentTrack(); as track) {
        <a routerLink="/now-playing" class="track-link">
          <div class="art-wrap">
            <img [src]="track.coverUrl" class="player-art" [alt]="track.title">
            <div class="art-playing" [class.active]="isPlaying">
              <span></span><span></span><span></span>
            </div>
          </div>
          <div class="track-text">
            <div class="song-name">{{ track.title }}</div>
            <div class="artist-name">{{ track.artist }}</div>
          </div>
        </a>
        <button class="heart-btn" title="Like">♥</button>
      } @else {
        <p class="idle-text">Pick a song to start listening</p>
      }
    </div>

    <!-- Center: controls + time -->
    <div class="player-controls">
      <div class="control-buttons">
        <button class="ctrl-btn" (click)="prev()" title="Previous">⏮</button>
        <button class="play-pause-btn" (click)="togglePlay()" [class.playing]="isPlaying">
          <span>{{ isPlaying ? '⏸' : '▶' }}</span>
        </button>
        <button class="ctrl-btn" (click)="next()" title="Next">⏭</button>
      </div>
      <div class="time-row">
        <span class="time-label">{{ currentTimeStr }}</span>
        <span class="time-sep">·</span>
        <span class="time-label">{{ durationStr }}</span>
      </div>
    </div>

    <!-- Right: volume -->
    <div class="volume-section">
      <span class="vol-icon">{{ volume > 50 ? '🔊' : volume > 0 ? '🔉' : '🔇' }}</span>
      <div class="volume-bar-wrap">
        <div class="volume-fill" [style.width.%]="volume"></div>
        <input type="range" class="volume-input" min="0" max="100" [value]="volume" (input)="onVolume($event)" />
      </div>
      <span class="vol-pct">{{ volume }}%</span>
    </div>
  </div>
</footer>
